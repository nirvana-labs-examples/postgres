---
- name: Install and Configure PostgreSQL
  hosts: postgres
  become: yes
  vars:
    # PostgreSQL version
    postgres_version: "16"

    # Database configuration
    postgres_port: 5432
    postgres_listen_addresses: "*"
    postgres_max_connections: 100

    # Memory settings (adjust based on VM memory)
    postgres_shared_buffers: "1GB"
    postgres_effective_cache_size: "3GB"
    postgres_work_mem: "16MB"
    postgres_maintenance_work_mem: "256MB"

    # WAL settings
    postgres_wal_buffers: "64MB"
    postgres_min_wal_size: "1GB"
    postgres_max_wal_size: "4GB"

    # Checkpoint settings
    postgres_checkpoint_completion_target: "0.9"

    # Query planner
    postgres_random_page_cost: "1.1"
    postgres_effective_io_concurrency: "200"

    # Parallel query
    postgres_max_worker_processes: 4
    postgres_max_parallel_workers_per_gather: 2
    postgres_max_parallel_workers: 4
    postgres_max_parallel_maintenance_workers: 2

    # Logging
    postgres_log_timezone: "UTC"
    postgres_log_statement: "ddl"
    postgres_log_min_duration_statement: 1000

    # Default database and user
    postgres_db: "appdb"
    postgres_user: "appuser"
    postgres_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"

    # Data directory
    postgres_data_dir: "/var/lib/postgresql/{{ postgres_version }}/main"
    postgres_config_dir: "/etc/postgresql/{{ postgres_version }}/main"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name:
          - gnupg
          - wget
          - lsb-release
          - python3-psycopg2
          - acl
        state: present

    - name: Add PostgreSQL APT repository key
      shell: |
        wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg --yes

    - name: Add PostgreSQL APT repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        state: present
        filename: postgresql

    - name: Install PostgreSQL
      apt:
        name:
          - "postgresql-{{ postgres_version }}"
          - "postgresql-contrib-{{ postgres_version }}"
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL is started and enabled
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Configure postgresql.conf
      blockinfile:
        path: "{{ postgres_config_dir }}/postgresql.conf"
        block: |
          # Connection Settings
          listen_addresses = '{{ postgres_listen_addresses }}'
          port = {{ postgres_port }}
          max_connections = {{ postgres_max_connections }}

          # Memory Settings
          shared_buffers = {{ postgres_shared_buffers }}
          effective_cache_size = {{ postgres_effective_cache_size }}
          work_mem = {{ postgres_work_mem }}
          maintenance_work_mem = {{ postgres_maintenance_work_mem }}

          # WAL Settings
          wal_buffers = {{ postgres_wal_buffers }}
          min_wal_size = {{ postgres_min_wal_size }}
          max_wal_size = {{ postgres_max_wal_size }}

          # Checkpoint Settings
          checkpoint_completion_target = {{ postgres_checkpoint_completion_target }}

          # Query Planner
          random_page_cost = {{ postgres_random_page_cost }}
          effective_io_concurrency = {{ postgres_effective_io_concurrency }}

          # Parallel Query
          max_worker_processes = {{ postgres_max_worker_processes }}
          max_parallel_workers_per_gather = {{ postgres_max_parallel_workers_per_gather }}
          max_parallel_workers = {{ postgres_max_parallel_workers }}
          max_parallel_maintenance_workers = {{ postgres_max_parallel_maintenance_workers }}

          # Logging
          log_timezone = '{{ postgres_log_timezone }}'
          log_statement = '{{ postgres_log_statement }}'
          log_min_duration_statement = {{ postgres_log_min_duration_statement }}
        marker: "# {mark} ANSIBLE MANAGED POSTGRESQL CONFIG"
      notify: Restart PostgreSQL

    - name: Configure pg_hba.conf for remote access
      blockinfile:
        path: "{{ postgres_config_dir }}/pg_hba.conf"
        block: |
          # Allow remote connections with password authentication
          host    all             all             0.0.0.0/0               scram-sha-256
          host    all             all             ::/0                    scram-sha-256
        marker: "# {mark} ANSIBLE MANAGED HBA CONFIG"
      notify: Restart PostgreSQL

    - name: Flush handlers to apply config
      meta: flush_handlers

    - name: Create application database
      become_user: postgres
      postgresql_db:
        name: "{{ postgres_db }}"
        encoding: UTF8
        lc_collate: en_US.UTF-8
        lc_ctype: en_US.UTF-8
        template: template0
        state: present

    - name: Create application user
      become_user: postgres
      postgresql_user:
        name: "{{ postgres_user }}"
        password: "{{ postgres_password }}"
        state: present

    - name: Grant database privileges to application user
      become_user: postgres
      postgresql_privs:
        db: "{{ postgres_db }}"
        privs: ALL
        type: database
        role: "{{ postgres_user }}"

    - name: Grant schema privileges to application user
      become_user: postgres
      postgresql_privs:
        db: "{{ postgres_db }}"
        privs: ALL
        type: schema
        objs: public
        role: "{{ postgres_user }}"

    - name: Save credentials to file
      copy:
        content: |
          PostgreSQL Credentials
          =======================
          Host: {{ ansible_host }}
          Port: {{ postgres_port }}
          Database: {{ postgres_db }}
          Username: {{ postgres_user }}
          Password: {{ postgres_password }}

          Connection String:
          postgresql://{{ postgres_user }}:{{ postgres_password }}@{{ ansible_host }}:{{ postgres_port }}/{{ postgres_db }}

          psql Command:
          PGPASSWORD='{{ postgres_password }}' psql -h {{ ansible_host }} -p {{ postgres_port }} -U {{ postgres_user }} -d {{ postgres_db }}
        dest: /root/postgres_credentials.txt
        mode: '0600'

    - name: Display credentials
      debug:
        msg: |
          ================================================
          PostgreSQL installed successfully!
          ================================================
          Host: {{ ansible_host }}
          Port: {{ postgres_port }}
          Database: {{ postgres_db }}
          Username: {{ postgres_user }}
          Password: {{ postgres_password }}

          Connection String:
          postgresql://{{ postgres_user }}:{{ postgres_password }}@{{ ansible_host }}:{{ postgres_port }}/{{ postgres_db }}

          Credentials saved to: /root/postgres_credentials.txt
          ================================================

  handlers:
    - name: Restart PostgreSQL
      systemd:
        name: postgresql
        state: restarted
